apiVersion: apps/v1
kind: Deployment
metadata:
  name: zoo-cloud-web
  namespace: zoo
  labels:
    app.kubernetes.io/name: zoo-cloud-web
    app.kubernetes.io/part-of: zoo-cloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: zoo-cloud-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zoo-cloud-web
    spec:
      containers:
        - name: web
          image: ghcr.io/zooai/cloud:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: zoo-cloud-web
  namespace: zoo
spec:
  selector:
    app.kubernetes.io/name: zoo-cloud-web
  ports:
    - port: 80
      targetPort: 3000
